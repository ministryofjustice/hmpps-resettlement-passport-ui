name: Build and run pt browser smoke test
on:
  workflow_call:
    inputs:
      node_version_file:
        description: "Passed to setup-node action to specify where to source the version of node from"
        required: false
        type: string
        default: ".nvmrc"
permissions:
  contents: read
jobs:
  pt-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Use Node.js ${{ inputs.node_version_file }}
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: ${{ inputs.node_version_file }}
      - name: restore cache
        id: restore-cache
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        env:
          cache-name: node-modules
        with:
          path: |
            ./node_modules
            ~/.cache/Cypress
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
      - name: download the artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: npm_build_artifacts
      - uses: grafana/setup-k6-action@ffe7d7290dfa715e48c2ccc924d068444c94bde2 # v1
        with:
          browser: true
      - name: set up environment variables
        run: |
            export PT_USERNAME=${E2E_DEV_USERNAME}
            export PT_PASSWORD=${E2E_DEV_PASSWORD}
            export EXECUTION_TYPE=smoke
            export PROCESS=dev
      - uses: grafana/run-k6-action@a15e2072ede004e8d46141e33d7f7dad8ad08d9d # v1
        env:
          EXECUTION_TYPE: smoke
          PROCESS: dev
        with:
          path: |
            pt_tests/tests/run.js
          debug: true
          #inspect-flags: 'EXECUTION_TYPE smoke PROCESS dev'
#          flags: |
#            --no-setup
#      - name: run pt browser smoke test
#        run: |
#            export PT_USERNAME=${E2E_DEV_USERNAME}
#            export PT_PASSWORD=${E2E_DEV_PASSWORD}
#            k6 run pt_tests/tests/run.js --no-setup
#        env:
#          execution_type: smoke
#          process: dev
      - name: upload the artifacts
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pt_browser_smoke_test_artifacts
          path: test_results
      - name: publish test report
        if: ${{ !cancelled() && github.event.repository.visibility == 'public' }}
        uses: dorny/test-reporter@df6247429542221bc30d46a036ee47af1102c451 # v2
        with:
          artifact: pt_browser_smoke_test_artifacts
          name: Test Report
          path: 'jest/**/*.xml'
          reporter: java-junit
          fail-on-empty: false
          fail-on-error: false
          list-suites: 'failed'
          list-tests: 'failed'
